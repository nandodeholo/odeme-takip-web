<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nando | Private Ledger</title>
    <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000000;
            --card-bg: rgba(28, 28, 30, 0.5);
            --card-border: rgba(255, 255, 255, 0.08);
            --accent: #ffffff;
            --text-primary: #ffffff;
            --text-secondary: #8e8e93;
            --success: #32d74b;
            --danger: #ff453a;
            --font-main: 'Inter', -apple-system, sans-serif;
            --font-display: 'SF Pro Display', -apple-system, sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg);
            color: var(--text-primary);
            font-family: var(--font-main);
            min-height: 100vh;
            padding: 24px 16px;
            overflow-x: hidden;
        }

        .container { max-width: 600px; margin: 0 auto; }

        /* --- Minimal Header --- */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            padding: 0 4px;
        }

        .logo {
            font-family: var(--font-display);
            font-weight: 700;
            font-size: 20px;
            letter-spacing: -0.5px;
        }

        .nav-actions { display: flex; gap: 12px; }

        .btn-icon {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            width: 40px;
            height: 40px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        /* --- Hero Bento --- */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 24px;
        }

        .bento-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 24px;
            backdrop-filter: blur(20px);
            position: relative;
            overflow: hidden;
        }

        .bento-main { grid-column: span 2; padding: 32px 24px; }

        .label {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            display: block;
        }

        .amount-display {
            font-family: var(--font-display);
            font-weight: 700;
            font-size: 44px;
            letter-spacing: -2px;
            margin-bottom: 16px;
        }

        .btn-add {
            background: var(--accent);
            color: #000;
            border: none;
            padding: 12px 24px;
            border-radius: 14px;
            font-weight: 600;
            font-size: 14px;
            width: 100%;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .btn-add:active { transform: scale(0.98); }

        /* --- Section Styling --- */
        .section-title {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            margin: 24px 0 12px 8px;
            display: flex;
            justify-content: space-between;
        }

        .ledger-list { display: flex; flex-direction: column; gap: 8px; }

        .ledger-item {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 16px;
            transition: background 0.2s;
        }

        .ledger-item.paid { opacity: 0.35; filter: grayscale(0.8); }

        .checkbox-wrapper {
            width: 24px;
            height: 24px;
            border: 2px solid var(--card-border);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .checkbox-wrapper.checked { background: var(--accent); border-color: var(--accent); }
        .checkbox-wrapper.checked::after {
            content: '';
            width: 10px;
            height: 5px;
            border-left: 2px solid #000;
            border-bottom: 2px solid #000;
            transform: rotate(-45deg) translateY(-1px);
        }

        .item-info { flex: 1; }
        .item-name { font-weight: 600; font-size: 15px; margin-bottom: 2px; }
        .item-meta { font-size: 12px; color: var(--text-secondary); }

        .item-amount { font-weight: 700; font-size: 16px; font-family: var(--font-display); }

        /* --- Tabs --- */
        .tab-bar {
            position: fixed;
            bottom: 32px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(28, 28, 30, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid var(--card-border);
            padding: 6px;
            border-radius: 20px;
            display: flex;
            gap: 4px;
            z-index: 1000;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        .tab-btn {
            padding: 10px 20px;
            border-radius: 14px;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .tab-btn.active { background: rgba(255,255,255,0.1); color: #fff; }

        /* --- Modal (Clean) --- */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(15px);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal.active { display: flex; }

        .modal-content {
            background: #1c1c1e;
            border: 1px solid var(--card-border);
            width: 100%;
            max-width: 400px;
            border-radius: 32px;
            padding: 32px;
        }

        .form-group { margin-bottom: 20px; }
        .input-minimal {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 1px solid var(--card-border);
            padding: 12px 0;
            color: #fff;
            font-size: 18px;
            font-weight: 500;
        }
        .input-minimal:focus { outline: none; border-color: var(--accent); }

        /* --- Animations --- */
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .animate-up { animation: slideUp 0.4s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">NANDO</div>
            <div class="nav-actions">
                <button class="btn-icon" onclick="exportData()">💾</button>
                <button class="btn-icon" onclick="createNewMonth()">🗓️</button>
            </div>
        </header>

        <div class="dashboard-grid">
            <div class="bento-card bento-main animate-up">
                <span class="label">Balance Due</span>
                <div class="amount-display" id="grandTotal">0 ₺</div>
                <button class="btn-add" onclick="showAddExpenseModal()">New Transaction</button>
            </div>
        </div>

        <div id="paymentsPage">
            <div id="monthsContainer"></div>
        </div>

        <div id="settingsPage" style="display:none;">
            <div class="section-title">CARDS & BANKS</div>
            <div id="bankList" class="ledger-list"></div>
            <button class="btn-add" style="margin-top: 20px;" onclick="showAddBankModal(null)">+ Add Account</button>
        </div>
    </div>

    <div class="tab-bar">
        <button class="tab-btn active" id="tabPayments" onclick="switchPage('payments')">Ledger</button>
        <button class="tab-btn" id="tabSettings" onclick="switchPage('settings')">Accounts</button>
    </div>

    <!-- Modals (Add Expense) -->
    <div class="modal" id="addExpenseModal">
        <div class="modal-content">
            <h2 style="font-family: var(--font-display); margin-bottom: 24px;">Add Transaction</h2>
            <div class="form-group">
                <span class="label">Amount (₺)</span>
                <input type="number" id="expenseAmount" class="input-minimal" placeholder="0.00">
            </div>
            <div class="form-group">
                <span class="label">Installments</span>
                <input type="number" id="expenseInstallments" class="input-minimal" value="1">
            </div>
            <div class="form-group">
                <span class="label">Account</span>
                <select id="expenseCard" class="input-minimal" style="background: #1c1c1e;"></select>
            </div>
            <div class="form-group">
                <span class="label">Start Period</span>
                <select id="expenseMonth" class="input-minimal" style="background: #1c1c1e;"></select>
            </div>
            <button class="btn-add" onclick="saveExpense()">Finalize</button>
            <button class="btn-icon" style="width:100%; margin-top:12px; border:none; background:transparent; color:var(--text-secondary);" onclick="closeModal('addExpenseModal')">Cancel</button>
        </div>
    </div>

    <!-- Edit Amount Modal -->
    <div class="modal" id="addAmountModal">
        <div class="modal-content">
            <h2 style="font-family: var(--font-display); margin-bottom: 24px;" id="amountBankName">Update</h2>
            <div class="form-group">
                <span class="label">New Value (₺)</span>
                <input type="number" id="newAmount" class="input-minimal">
            </div>
            <button class="btn-add" onclick="saveAmount()">Save Changes</button>
            <button class="btn-icon" style="width:100%; margin-top:12px; border:none; background:transparent; color:var(--text-secondary);" onclick="closeModal('addAmountModal')">Discard</button>
        </div>
    </div>

    <!-- Bank Settings Modal -->
    <div class="modal" id="addBankModal">
        <div class="modal-content">
            <h2 style="font-family: var(--font-display); margin-bottom: 24px;">Setup Account</h2>
            <div class="form-group">
                <span class="label">Name</span>
                <input type="text" id="newBankName" class="input-minimal">
            </div>
            <div class="form-group">
                <span class="label">Identifier (Last 4)</span>
                <input type="text" id="newBankLastFour" class="input-minimal" maxlength="4">
            </div>
            <div class="form-group">
                <span class="label">Cycle Day</span>
                <input type="number" id="newBankDueDay" class="input-minimal">
            </div>
            <button class="btn-add" onclick="saveBankData()">Register</button>
            <button class="btn-icon" style="width:100%; margin-top:12px; border:none; background:transparent; color:var(--text-secondary);" onclick="closeModal('addBankModal')">Back</button>
        </div>
    </div>

    <script>
        let data = { banks: [], months: [], otherPayments: [], hiddenMonths: [] };
        const monthNames = ['Ocak', 'Şubat', 'Mart', 'Nisan', 'Mayıs', 'Haziran', 'Temmuz', 'Ağustos', 'Eylül', 'Ekim', 'Kasım', 'Aralık'];
        let currentAmountEdit = null, currentBankEdit = null;

        function formatMoney(amount) {
            return new Intl.NumberFormat('tr-TR', { minimumFractionDigits: 0, maximumFractionDigits: 0 }).format(Math.round(amount));
        }

        function saveData() { localStorage.setItem('paymentData', JSON.stringify(data)); }
        function loadData() {
            const saved = localStorage.getItem('paymentData');
            if (saved) data = JSON.parse(saved);
            renderPayments();
        }

        function switchPage(page) {
            const pPage = document.getElementById('paymentsPage');
            const sPage = document.getElementById('settingsPage');
            const tabP = document.getElementById('tabPayments');
            const tabS = document.getElementById('tabSettings');
            
            if (page === 'payments') {
                pPage.style.display = 'block'; sPage.style.display = 'none';
                tabP.classList.add('active'); tabS.classList.remove('active');
                renderPayments();
            } else {
                pPage.style.display = 'none'; sPage.style.display = 'block';
                tabP.classList.remove('active'); tabS.classList.add('active');
                renderSettings();
            }
        }

        function renderPayments() {
            const container = document.getElementById('monthsContainer');
            container.innerHTML = '';
            
            data.months.forEach((month, mIdx) => {
                const total = month.payments.reduce((s, p) => s + parseFloat(p.amount || 0), 0);
                const sectionId = `section-${mIdx}`;
                const isCollapsed = data.hiddenMonths && data.hiddenMonths.includes(sectionId);
                
                const section = document.createElement('div');
                section.className = 'animate-up';
                
                section.innerHTML = `
                    <div class="section-title" onclick="toggleSection('${sectionId}')" style="cursor:pointer; user-select:none;">
                        <span style="display:flex; align-items:center; gap:8px;">
                            <span style="transition:transform 0.2s; transform:${isCollapsed ? 'rotate(-90deg)' : 'rotate(0deg)'}; display:inline-block;">▾</span>
                            ${monthNames[month.month-1]} ${month.year}
                        </span>
                        <span>${formatMoney(total)} ₺</span>
                    </div>
                    <div class="ledger-list" id="${sectionId}" style="display:${isCollapsed ? 'none' : 'flex'}; flex-direction:column; gap:8px;">
                        ${month.payments.map((p, pIdx) => {
                            const bank = data.banks.find(b => b.id === p.bankId);
                            if(!bank) return '';
                            return `
                                <div class="ledger-item ${p.paid ? 'paid' : ''}">
                                    <div class="checkbox-wrapper ${p.paid ? 'checked' : ''}" onclick="togglePaid(${mIdx}, ${pIdx})"></div>
                                    <div class="item-info" onclick="editAmount(${mIdx}, ${pIdx})">
                                        <div class="item-name">${bank.name}</div>
                                        <div class="item-meta">Günü: ${bank.dueDay}</div>
                                    </div>
                                    <div class="item-amount">${formatMoney(p.amount)} ₺</div>
                                </div>
                            `;
                        }).join('')}
                    </div>
                `;
                container.appendChild(section);
            });
            updateGrandTotal();
        }

        function toggleSection(id) {
            if (!data.hiddenMonths) data.hiddenMonths = [];
            const index = data.hiddenMonths.indexOf(id);
            if (index > -1) {
                data.hiddenMonths.splice(index, 1);
            } else {
                data.hiddenMonths.push(id);
            }
            saveData();
            renderPayments();
        }

        function renderSettings() {
            const container = document.getElementById('bankList');
            container.innerHTML = data.banks.map((bank, idx) => `
                <div class="ledger-item">
                    <div class="item-info">
                        <div class="item-name">${bank.name}</div>
                        <div class="item-meta">${bank.lastFour || '****'} • Kesim: ${bank.dueDay}</div>
                    </div>
                    <div style="display:flex; gap:8px;">
                        <button class="btn-icon" onclick="showAddBankModal(${idx})">✎</button>
                        <button class="btn-icon" style="color:var(--danger);" onclick="deleteBank(${idx})">✕</button>
                    </div>
                </div>
            `).join('');
        }

        function updateGrandTotal() {
            const total = data.months.reduce((s, m) => s + m.payments.filter(p => !p.paid).reduce((ms, p) => ms + parseFloat(p.amount || 0), 0), 0);
            document.getElementById('grandTotal').textContent = `${formatMoney(total)} ₺`;
        }

        function togglePaid(mIdx, pIdx) {
            data.months[mIdx].payments[pIdx].paid = !data.months[mIdx].payments[pIdx].paid;
            saveData(); renderPayments();
        }

        function editAmount(mIdx, pIdx) {
            currentAmountEdit = { mIdx, pIdx };
            const p = data.months[mIdx].payments[pIdx];
            const b = data.banks.find(bank => bank.id === p.bankId);
            document.getElementById('amountBankName').textContent = b.name;
            document.getElementById('newAmount').value = p.amount;
            document.getElementById('addAmountModal').classList.add('active');
        }

        function saveAmount() {
            data.months[currentAmountEdit.mIdx].payments[currentAmountEdit.pIdx].amount = parseFloat(document.getElementById('newAmount').value);
            saveData(); closeModal('addAmountModal'); renderPayments();
        }

        function showAddBankModal(idx) {
            currentBankEdit = idx;
            if(idx !== null) {
                const b = data.banks[idx];
                document.getElementById('newBankName').value = b.name;
                document.getElementById('newBankLastFour').value = b.lastFour;
                document.getElementById('newBankDueDay').value = b.dueDay;
            } else {
                document.getElementById('newBankName').value = '';
                document.getElementById('newBankLastFour').value = '';
                document.getElementById('newBankDueDay').value = '';
            }
            document.getElementById('addBankModal').classList.add('active');
        }

        function saveBankData() {
            const name = document.getElementById('newBankName').value;
            const last4 = document.getElementById('newBankLastFour').value;
            const day = parseInt(document.getElementById('newBankDueDay').value);
            
            if(currentBankEdit !== null) {
                data.banks[currentBankEdit] = { ...data.banks[currentBankEdit], name, lastFour: last4, dueDay: day };
            } else {
                const id = Date.now();
                data.banks.push({ id, name, lastFour: last4, dueDay: day });
                data.months.forEach(m => m.payments.push({ bankId: id, amount: 0, paid: false }));
            }
            saveData(); closeModal('addBankModal'); renderSettings();
        }

        function deleteBank(idx) {
            if(confirm('Hesabı silmek istediğine emin misin?')) {
                const id = data.banks[idx].id;
                data.banks.splice(idx, 1);
                data.months.forEach(m => m.payments = m.payments.filter(p => p.bankId !== id));
                saveData(); renderSettings();
            }
        }

        function showAddExpenseModal() {
            const cSel = document.getElementById('expenseCard');
            cSel.innerHTML = data.banks.map(b => `<option value="${b.id}">${b.name}</option>`).join('');
            const mSel = document.getElementById('expenseMonth');
            mSel.innerHTML = data.months.map((m, i) => `<option value="${i}">${monthNames[m.month-1]} ${m.year}</option>`).join('');
            document.getElementById('addExpenseModal').classList.add('active');
        }

        function saveExpense() {
            const amt = parseFloat(document.getElementById('expenseAmount').value);
            const inst = parseInt(document.getElementById('expenseInstallments').value) || 1;
            const bId = parseInt(document.getElementById('expenseCard').value);
            const sIdx = parseInt(document.getElementById('expenseMonth').value);
            
            const instAmt = amt / inst;
            for(let i=0; i<inst; i++) {
                const tIdx = sIdx + i;
                if(data.months[tIdx]) {
                    const p = data.months[tIdx].payments.find(p => p.bankId === bId);
                    if(p) p.amount += instAmt;
                }
            }
            saveData(); closeModal('addExpenseModal'); renderPayments();
        }

        function createNewMonth() {
            const last = data.months[data.months.length-1] || { year: new Date().getFullYear(), month: new Date().getMonth() };
            let m = last.month + 1;
            let y = last.year;
            if(m > 12) { m = 1; y++; }
            data.months.push({ year: y, month: m, payments: data.banks.map(b => ({ bankId: b.id, amount: 0, paid: false })) });
            saveData(); renderPayments();
        }

        function closeModal(id) { document.getElementById(id).classList.remove('active'); }
        function exportData() {
            const blob = new Blob([JSON.stringify(data)], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href = url; a.download = 'nando-data.json'; a.click();
        }

        loadData();
    </script>
</body>
</html>
