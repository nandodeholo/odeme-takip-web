<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nando Premium | Ödeme Takip</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #0a0a0c;
            --bg-card: #141417;
            --bg-input: #1c1c21;
            --accent-primary: #6366f1;
            --accent-secondary: #a855f7;
            --text-main: #f4f4f5;
            --text-muted: #a1a1aa;
            --border: rgba(255, 255, 255, 0.08);
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            min-height: 100vh;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 0 16px;
        }

        /* --- Header & Nav --- */
        .top-nav {
            background: rgba(10, 10, 12, 0.8);
            backdrop-filter: blur(20px);
            padding: 24px 0;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid var(--border);
        }

        .nav-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-title {
            font-size: 20px;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #fff 0%, #a1a1aa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-btn-group { display: flex; gap: 8px; }

        .btn-ghost {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-muted);
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-ghost:hover {
            background: var(--bg-input);
            color: #fff;
            border-color: #fff;
        }

        /* --- Dashboard Area --- */
        .dashboard-hero {
            padding: 40px 0;
            text-align: center;
        }

        .grand-total-label {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 8px;
        }

        .grand-total-amount {
            font-size: 64px;
            font-weight: 800;
            letter-spacing: -3px;
            color: #fff;
            margin-bottom: 24px;
        }

        .add-expense-trigger {
            background: #fff;
            color: #000;
            border: none;
            padding: 14px 32px;
            border-radius: 14px;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .add-expense-trigger:hover { transform: scale(1.02); }

        /* --- Tabs --- */
        .tabs {
            display: flex;
            background: var(--bg-card);
            padding: 4px;
            border-radius: 12px;
            margin-bottom: 32px;
            border: 1px solid var(--border);
        }

        .tab {
            flex: 1;
            padding: 10px;
            border: none;
            background: transparent;
            color: var(--text-muted);
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            border-radius: 10px;
        }

        .tab.active {
            background: var(--bg-input);
            color: #fff;
        }

        /* --- Sections & Cards --- */
        .section-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            margin-bottom: 16px;
            overflow: hidden;
        }

        .section-header {
            padding: 20px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: background 0.2s;
        }

        .section-header:hover { background: rgba(255,255,255,0.02); }

        .section-title { font-weight: 700; font-size: 16px; display: flex; align-items: center; gap: 12px; }

        .payment-item {
            padding: 16px 24px;
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.2s;
        }

        .payment-item:hover { background: rgba(255,255,255,0.01); }

        .payment-info { flex: 1; padding-left: 16px; }

        .payment-name { font-weight: 600; font-size: 15px; }

        .payment-meta { font-size: 12px; color: var(--text-muted); }

        .payment-value { font-weight: 700; font-size: 16px; }

        .payment-item.paid { opacity: 0.4; filter: grayscale(1); }

        /* --- Custom Inputs --- */
        .premium-checkbox {
            width: 22px;
            height: 22px;
            accent-color: var(--accent-primary);
            cursor: pointer;
        }

        /* --- Modals --- */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal.active { display: flex; }

        .modal-content {
            background: var(--bg-card);
            border: 1px solid var(--border);
            padding: 32px;
            border-radius: 24px;
            width: 100%;
            max-width: 440px;
        }

        .form-label { display: block; font-size: 12px; font-weight: 600; color: var(--text-muted); margin-bottom: 8px; text-transform: uppercase; }

        .form-input {
            width: 100%;
            background: var(--bg-input);
            border: 1px solid var(--border);
            padding: 14px;
            border-radius: 12px;
            color: #fff;
            margin-bottom: 20px;
            font-size: 16px;
        }

        .form-input:focus { outline: none; border-color: var(--accent-primary); }

        .btn-primary {
            width: 100%;
            padding: 16px;
            background: #fff;
            color: #000;
            border: none;
            border-radius: 14px;
            font-weight: 700;
            cursor: pointer;
        }

        /* --- Mobile Adjustments --- */
        @media (max-width: 600px) {
            .grand-total-amount { font-size: 48px; }
            .nav-btn-group { display: none; }
        }
    </style>
</head>
<body class="dark-theme">
    <div class="top-nav">
        <div class="container nav-content">
            <div class="nav-title">NANDO PREMIUM</div>
            <div class="nav-btn-group">
                <button class="btn-ghost" onclick="exportData()">EXPORT</button>
                <button class="btn-ghost" onclick="document.getElementById('importFile').click()">IMPORT</button>
                <button class="btn-ghost" onclick="createNewMonth()">NEW PERIOD</button>
            </div>
        </div>
    </div>

    <input type="file" id="importFile" accept=".json" style="display: none;" onchange="importData(event)">

    <div class="container">
        <div class="dashboard-hero">
            <p class="grand-total-label">Total Liabilities</p>
            <h1 class="grand-total-amount" id="grandTotal">0 ₺</h1>
            <button class="add-expense-trigger" onclick="showAddExpenseModal()">Add New Transaction</button>
        </div>

        <div class="tabs">
            <button class="tab active" onclick="switchPage('payments')">Payments</button>
            <button class="tab" onclick="switchPage('settings')">Cards</button>
        </div>

        <div id="paymentsPage">
            <div id="otherPaymentsContainer"></div>
            <div id="monthsContainer"></div>
        </div>

        <div id="settingsPage" style="display:none;">
            <div id="bankList"></div>
            <div style="margin-top: 24px;">
                <button class="btn-primary" onclick="showAddBankModal(null)">+ Add New Card</button>
            </div>
        </div>
    </div>

    <!-- Modals -->
    <div class="modal" id="addExpenseModal">
        <div class="modal-content">
            <h2 style="margin-bottom: 24px;">Add Expense</h2>
            <label class="form-label">Amount (₺)</label>
            <input type="number" id="expenseAmount" class="form-input" placeholder="0.00">
            
            <label class="form-label">Installments</label>
            <input type="number" id="expenseInstallments" class="form-input" value="1">
            
            <label class="form-label">Select Card</label>
            <select id="expenseCard" class="form-input"></select>
            
            <label class="form-label">Starting Period</label>
            <select id="expenseMonth" class="form-input"></select>
            
            <button class="btn-primary" onclick="saveExpense()">Confirm Transaction</button>
            <button class="btn-ghost" style="width:100%; margin-top:12px;" onclick="closeModal('addExpenseModal')">Cancel</button>
        </div>
    </div>

    <div class="modal" id="addAmountModal">
        <div class="modal-content">
            <h2 id="amountBankName" style="margin-bottom: 24px;">Edit Amount</h2>
            <label class="form-label">New Amount</label>
            <input type="number" id="newAmount" class="form-input">
            <button class="btn-primary" onclick="saveAmount()">Save Changes</button>
            <button class="btn-ghost" style="width:100%; margin-top:12px;" onclick="closeModal('addAmountModal')">Cancel</button>
        </div>
    </div>

    <div class="modal" id="addBankModal">
        <div class="modal-content">
            <h2 id="bankModalTitle" style="margin-bottom: 24px;">Card Setup</h2>
            <label class="form-label">Bank Name</label>
            <input type="text" id="newBankName" class="form-input">
            <label class="form-label">Last 4 Digits</label>
            <input type="text" id="newBankLastFour" class="form-input" maxlength="4">
            <label class="form-label">Due Day (1-31)</label>
            <input type="number" id="newBankDueDay" class="form-input">
            <button class="btn-primary" onclick="saveBankData()">Save Card</button>
            <button class="btn-ghost" style="width:100%; margin-top:12px;" onclick="closeModal('addBankModal')">Cancel</button>
        </div>
    </div>

    <script>
        let data = { banks: [], months: [], otherPayments: [], hiddenMonths: [] };
        const monthNames = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
        let currentAmountEdit = null, currentBankEdit = null;

        function formatMoney(amount) {
            return new Intl.NumberFormat('tr-TR', { minimumFractionDigits: 0, maximumFractionDigits: 0 }).format(Math.round(amount));
        }

        function saveData() { localStorage.setItem('paymentData', JSON.stringify(data)); }
        function loadData() {
            const saved = localStorage.getItem('paymentData');
            if (saved) data = JSON.parse(saved);
            renderPayments();
        }

        function switchPage(page) {
            const pPage = document.getElementById('paymentsPage');
            const sPage = document.getElementById('settingsPage');
            const tabs = document.querySelectorAll('.tab');
            
            if (page === 'payments') {
                pPage.style.display = 'block'; sPage.style.display = 'none';
                tabs[0].classList.add('active'); tabs[1].classList.remove('active');
                renderPayments();
            } else {
                pPage.style.display = 'none'; sPage.style.display = 'block';
                tabs[0].classList.remove('active'); tabs[1].classList.add('active');
                renderSettings();
            }
        }

        function renderPayments() {
            const container = document.getElementById('monthsContainer');
            container.innerHTML = '';
            
            data.months.forEach((month, mIdx) => {
                const card = document.createElement('div');
                card.className = 'section-card';
                
                const total = month.payments.reduce((s, p) => s + parseFloat(p.amount || 0), 0);
                
                card.innerHTML = `
                    <div class="section-header">
                        <div class="section-title"><span>●</span> ${monthNames[month.month-1]} ${month.year}</div>
                        <div style="font-weight:800;">${formatMoney(total)} ₺</div>
                    </div>
                    <div class="section-body">
                        ${month.payments.map((p, pIdx) => {
                            const bank = data.banks.find(b => b.id === p.bankId);
                            if(!bank) return '';
                            return `
                                <div class="payment-item ${p.paid ? 'paid' : ''}">
                                    <input type="checkbox" class="premium-checkbox" ${p.paid ? 'checked' : ''} onclick="togglePaid(${mIdx}, ${pIdx})">
                                    <div class="payment-info" onclick="editAmount(${mIdx}, ${pIdx})">
                                        <div class="payment-name">${bank.name}</div>
                                        <div class="payment-meta">Due on ${bank.dueDay}th</div>
                                    </div>
                                    <div class="payment-value">${formatMoney(p.amount)} ₺</div>
                                </div>
                            `;
                        }).join('')}
                    </div>
                `;
                container.appendChild(card);
            });
            updateGrandTotal();
        }

        function renderSettings() {
            const container = document.getElementById('bankList');
            container.innerHTML = data.banks.map((bank, idx) => `
                <div class="section-card" style="padding:20px; display:flex; justify-content:space-between; align-items:center;">
                    <div>
                        <div style="font-weight:700;">${bank.name} (${bank.lastFour || '****'})</div>
                        <div style="font-size:12px; color:var(--text-muted);">Due Day: ${bank.dueDay}</div>
                    </div>
                    <div style="display:flex; gap:8px;">
                        <button class="btn-ghost" onclick="showAddBankModal(${idx})">Edit</button>
                        <button class="btn-ghost" style="color:var(--danger);" onclick="deleteBank(${idx})">Delete</button>
                    </div>
                </div>
            `).join('');
        }

        function updateGrandTotal() {
            const total = data.months.reduce((s, m) => s + m.payments.filter(p => !p.paid).reduce((ms, p) => ms + parseFloat(p.amount || 0), 0), 0);
            document.getElementById('grandTotal').textContent = `${formatMoney(total)} ₺`;
        }

        function togglePaid(mIdx, pIdx) {
            data.months[mIdx].payments[pIdx].paid = !data.months[mIdx].payments[pIdx].paid;
            saveData(); renderPayments();
        }

        function editAmount(mIdx, pIdx) {
            currentAmountEdit = { mIdx, pIdx };
            const p = data.months[mIdx].payments[pIdx];
            const b = data.banks.find(bank => bank.id === p.bankId);
            document.getElementById('amountBankName').textContent = b.name;
            document.getElementById('newAmount').value = p.amount;
            document.getElementById('addAmountModal').classList.add('active');
        }

        function saveAmount() {
            data.months[currentAmountEdit.mIdx].payments[currentAmountEdit.pIdx].amount = parseFloat(document.getElementById('newAmount').value);
            saveData(); closeModal('addAmountModal'); renderPayments();
        }

        function showAddBankModal(idx) {
            currentBankEdit = idx;
            if(idx !== null) {
                const b = data.banks[idx];
                document.getElementById('newBankName').value = b.name;
                document.getElementById('newBankLastFour').value = b.lastFour;
                document.getElementById('newBankDueDay').value = b.dueDay;
            }
            document.getElementById('addBankModal').classList.add('active');
        }

        function saveBankData() {
            const name = document.getElementById('newBankName').value;
            const last4 = document.getElementById('newBankLastFour').value;
            const day = parseInt(document.getElementById('newBankDueDay').value);
            
            if(currentBankEdit !== null) {
                data.banks[currentBankEdit] = { ...data.banks[currentBankEdit], name, lastFour: last4, dueDay: day };
            } else {
                const id = Date.now();
                data.banks.push({ id, name, lastFour: last4, dueDay: day });
                data.months.forEach(m => m.payments.push({ bankId: id, amount: 0, paid: false }));
            }
            saveData(); closeModal('addBankModal'); renderSettings();
        }

        function deleteBank(idx) {
            const id = data.banks[idx].id;
            data.banks.splice(idx, 1);
            data.months.forEach(m => m.payments = m.payments.filter(p => p.bankId !== id));
            saveData(); renderSettings();
        }

        function showAddExpenseModal() {
            const cSel = document.getElementById('expenseCard');
            cSel.innerHTML = data.banks.map(b => `<option value="${b.id}">${b.name}</option>`).join('');
            const mSel = document.getElementById('expenseMonth');
            mSel.innerHTML = data.months.map((m, i) => `<option value="${i}">${monthNames[m.month-1]} ${m.year}</option>`).join('');
            document.getElementById('addExpenseModal').classList.add('active');
        }

        function saveExpense() {
            const amt = parseFloat(document.getElementById('expenseAmount').value);
            const inst = parseInt(document.getElementById('expenseInstallments').value);
            const bId = parseInt(document.getElementById('expenseCard').value);
            const sIdx = parseInt(document.getElementById('expenseMonth').value);
            
            const instAmt = amt / inst;
            for(let i=0; i<inst; i++) {
                const tIdx = sIdx + i;
                if(data.months[tIdx]) {
                    const p = data.months[tIdx].payments.find(p => p.bankId === bId);
                    if(p) p.amount += instAmt;
                }
            }
            saveData(); closeModal('addExpenseModal'); renderPayments();
        }

        function createNewMonth() {
            const last = data.months[data.months.length-1] || { year: new Date().getFullYear(), month: new Date().getMonth() };
            const m = last.month === 12 ? 1 : last.month + 1;
            const y = last.month === 12 ? last.year + 1 : last.year;
            data.months.push({ year: y, month: m, payments: data.banks.map(b => ({ bankId: b.id, amount: 0, paid: false })) });
            saveData(); renderPayments();
        }

        function closeModal(id) { document.getElementById(id).classList.remove('active'); }
        function exportData() {
            const blob = new Blob([JSON.stringify(data)], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href = url; a.download = 'nando-backup.json'; a.click();
        }
        function importData(e) {
            const reader = new FileReader();
            reader.onload = (ev) => { data = JSON.parse(ev.target.result); saveData(); renderPayments(); };
            reader.readAsText(e.target.files[0]);
        }

        loadData();
    </script>
</body>
</html>
